<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #ece3d0;
      --paper: rgba(245, 238, 224, 0.96);
      --paper-edge: rgba(124, 101, 73, 0.18);
      --line: rgba(54, 42, 31, 0.42);
      --text: #1c1813;
      --muted: #65584a;
      --claude: #2d241c;
      --codex: #46392d;
      --projects: #5b4a3a;
      --warn: #6e4526;
      --danger: #9b2c1e;
    }

    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Georgia", "Times New Roman", "Songti TC", "Songti SC", "STSong", serif;
      font-size: 15px;
      line-height: 1.3;
      letter-spacing: 0.01em;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      padding: 10px;
      position: relative;
      background:
        radial-gradient(circle at 18% 12%, rgba(110, 84, 45, 0.05), transparent 24%),
        radial-gradient(circle at 82% 28%, rgba(146, 122, 85, 0.05), transparent 26%),
        radial-gradient(circle at 40% 78%, rgba(126, 102, 70, 0.04), transparent 22%),
        linear-gradient(180deg, #f0e8d7 0%, #ece3d0 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(28, 24, 19, 0.015) 0 1px,
          transparent 1px 4px
        );
      opacity: 0.35;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      width: 100%;
      height: 100%;
      padding: 6px;
      border: 1px solid rgba(28, 24, 19, 0.68);
      box-shadow:
        inset 0 0 0 3px rgba(236, 227, 208, 0.95),
        inset 0 0 0 4px rgba(28, 24, 19, 0.58);
      background: rgba(236, 227, 208, 0.28);
    }

    .card,
    .footer {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(217, 204, 178, 0.16)),
        var(--paper);
      border: 1px solid var(--paper-edge);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.26);
      border-radius: 0;
      overflow: hidden;
    }

    .card {
      padding: 8px 10px 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      min-height: 30px;
      gap: 8px;
      margin: 0 0 10px;
      padding: 7px 0 6px;
      background: none;
      color: var(--text);
      font-weight: 700;
      border-top: 1px solid rgba(28, 24, 19, 0.6);
      border-bottom: 1px solid rgba(28, 24, 19, 0.6);
    }

    .brand img {
      width: 20px;
      height: 20px;
      object-fit: cover;
      flex: none;
      filter: grayscale(1) sepia(0.24) contrast(1.12) brightness(0.92);
      opacity: 0.9;
    }

    .brand-icon {
      width: 20px;
      height: 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: none;
      color: var(--text);
      line-height: 1;
    }

    .brand-icon svg {
      width: 20px;
      height: 20px;
    }

    .brand h1 {
      margin: 0;
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-size: 15px;
      line-height: 1.2;
      font-weight: 700;
      text-transform: uppercase;
      font-variant: small-caps;
      letter-spacing: 0.08em;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      padding: 3px 8px;
      background: rgba(255, 255, 255, 0.18);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      line-height: 1.1;
      font-weight: 700;
      border: 1px solid rgba(28, 24, 19, 0.45);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
      border-radius: 0;
      white-space: nowrap;
    }

    .row,
    [data-project-list] {
      padding: 0 2px 4px;
    }

    .row + .row {
      border-top: 1px solid var(--line);
      margin-top: 10px;
      padding-top: 10px;
    }

    .row-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 5px;
    }

    .row-title {
      font-size: 15px;
      line-height: 1.3;
      font-weight: 700;
      color: var(--text);
    }

    .percent {
      font-size: 14px;
      line-height: 1.3;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    .track {
      position: relative;
      height: 13px;
      overflow: hidden;
      background: rgba(244, 236, 223, 0.92);
      border: 1px solid rgba(28, 24, 19, 0.5);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.26);
      border-radius: 0;
      padding: 1px;
    }

    .track::before {
      content: "";
      position: absolute;
      inset: 1px;
      background: repeating-linear-gradient(
        90deg,
        rgba(28, 24, 19, 0.03) 0 1px,
        transparent 1px 7px
      );
      pointer-events: none;
      z-index: 2;
    }

    .fill {
      width: 0%;
      height: 100%;
      min-width: 0;
      position: relative;
      z-index: 1;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(255, 255, 255, 0.08) 0 1px,
          transparent 1px 4px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(0, 0, 0, 0.06) 0 1px,
          transparent 1px 4px
        ),
        var(--accent);
      transition: width 140ms ease-out, background-color 140ms ease-out;
    }

    .reset {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      font-weight: 400;
      text-align: right;
      white-space: nowrap;
    }

    .reset[data-warning="true"] {
      color: #9b2c1e;
      font-weight: 700;
    }

    .row[data-available="false"] .percent,
    .row[data-available="false"] .reset {
      color: var(--muted);
    }

    .row[data-available="false"] .fill {
      width: 0%;
    }

    .proj-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 8px 2px;
      border-top: 1px solid var(--line);
      font-size: 14px;
      line-height: 1.3;
    }

    .proj-row:first-child {
      border-top: none;
    }

    .proj-rank {
      width: 18px;
      color: var(--muted);
      font-weight: 700;
      flex: none;
    }

    .proj-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .proj-tokens {
      color: var(--accent);
      font-weight: 700;
      white-space: nowrap;
    }

    .proj-cost {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .footer {
      min-height: 144px;
      padding: 12px 12px 12px;
    }

    .meta {
      display: grid;
      gap: 6px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.3;
      font-weight: 400;
    }

    .today {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
      color: var(--text);
      font-size: 15px;
      line-height: 1.3;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .action {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      background: rgba(255, 255, 255, 0.24);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      line-height: 1;
      font-weight: 700;
      border: 1px solid rgba(28, 24, 19, 0.45);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
      border-radius: 0;
      padding: 4px 10px;
      white-space: nowrap;
      flex: 1;
    }

    .action,
    .switch {
      transition: none;
    }

    .action:active,
    .switch:active {
      transform: translateY(1px);
      background: rgba(210, 197, 171, 0.44);
    }

    .action.primary {
      color: #2f251b;
    }

    .attribution {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
    }

    .attribution a {
      color: inherit;
      text-decoration: none;
    }


    main.wrap,
    .wrap {
      overflow-y: auto;
    }

    .cli-status {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid rgba(120, 255, 190, 0.24);
      border-radius: 8px;
      background: rgba(3, 8, 10, 0.86);
      color: #d9fbe8;
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
      font-size: 11px;
      line-height: 1.45;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .cli-status[hidden] {
      display: none;
    }

    .cli-line {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 8px;
      align-items: center;
      min-width: 0;
    }

    .cli-line + .cli-line {
      margin-top: 5px;
    }

    .cli-program { color: #30d158; font-weight: 800; }
    .cli-five { color: #ffd60a; }
    .cli-seven { color: #30d158; }
    .cli-context { color: #64d2ff; }
    .cli-total { color: #ff9f0a; }
    .cli-cache { color: #5de6ff; }
    .cli-cost { color: #bf5af2; }
    .cli-session { color: #8e8e93; }
    .cli-model { color: #bf5af2; }

    .cli-meter {
      width: 42px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      overflow: hidden;
      display: inline-flex;
      vertical-align: middle;
    }

    .cli-meter span {
      display: block;
      height: 100%;
      width: 0%;
      background: currentColor;
    }

  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" data-card="claude" style="--accent: var(--claude)">
      <header class="brand">
        <img src="{{CLAUDE_ICON}}" alt="">
        <h1 data-i18n="claude_name">Claude Code</h1>
        <button class="switch" data-action="switch" data-i18n="switch_panel">⇄ Switch Panel</button>
      </header>
      <div class="row" data-row="session"></div>
      <div class="row" data-row="weekly"></div>
    </section>

    <section class="card" data-card="codex" style="--accent: var(--codex)">
      <header class="brand">
        <img src="{{CODEX_ICON}}" alt="">
        <h1 data-i18n="codex_name">Codex</h1>
      </header>
      <div class="row" data-row="session"></div>
      <div class="row" data-row="weekly"></div>
    </section>

    <section class="card" data-card="projects" style="--accent: var(--projects)">
      <header class="brand">
        <div class="brand-icon"><svg width="30" height="30" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4.75 8.25C4.75 7.14543 5.64543 6.25 6.75 6.25H10.5729C10.9737 6.25 11.3598 6.40073 11.6548 6.67228L12.9952 7.90522C13.2902 8.17677 13.6763 8.3275 14.0771 8.3275H19.25C20.3546 8.3275 21.25 9.22293 21.25 10.3275V17.75C21.25 18.8546 20.3546 19.75 19.25 19.75H6.75C5.64543 19.75 4.75 18.8546 4.75 17.75V8.25Z" stroke="var(--projects)" stroke-width="1.6" stroke-linejoin="round"/><path d="M7.25 11.25H18.75" stroke="var(--projects)" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/><path d="M8.75 14.15C8.75 13.4596 9.30964 12.9 10 12.9H10.3C10.9904 12.9 11.55 13.4596 11.55 14.15V16.5H8.75V14.15Z" fill="var(--projects)" opacity="0.18" stroke="var(--projects)" stroke-width="1.4"/><path d="M12.6 13.25C12.6 12.6425 13.0925 12.15 13.7 12.15H14.05C14.6575 12.15 15.15 12.6425 15.15 13.25V16.5H12.6V13.25Z" fill="var(--projects)" opacity="0.3" stroke="var(--projects)" stroke-width="1.4"/><path d="M16.2 14.85C16.2 14.1873 16.7373 13.65 17.4 13.65H17.75C18.4127 13.65 18.95 14.1873 18.95 14.85V16.5H16.2V14.85Z" fill="var(--projects)" opacity="0.48" stroke="var(--projects)" stroke-width="1.4"/></svg></div>
        <h1 data-i18n="projects_title">Project Usage</h1>
        <button class="switch" data-action="toggle-project-range">Today</button>
        <button class="switch" data-action="analyze" data-i18n="analyze_usage">Analyze</button>
        <button class="switch" data-action="toggle-cli" data-i18n="cli">CLI</button>
      </header>
      <div data-project-list></div>
      <div class="cli-status" data-cli-panel hidden></div>
    </section>

    <section class="footer">
      <div class="meta">
        <div data-footer="rate">Rate: --</div>
        <div data-footer="status">Status: Loading</div>
      </div>
      <div class="today" data-footer="today">Today: $0.00 (0 tokens)</div>

      <div class="actions">
        <button class="action primary" data-action="refresh" data-i18n="refresh_now">↻ Refresh Now</button>
        <button class="action" data-action="quit" data-i18n="quit">⏻ Quit</button>
      </div>
      <p class="attribution">based on <a href="https://github.com/aqua5230/usage" target="_blank">usage</a> by lollapalooza</p>
    </section>
  </main>

  <script>
    const I18N = {{I18N_BUNDLE}};
    const FALLBACK_LANGUAGE = "en";
    const root = document.documentElement;
    let currentLanguage = "en";
    let projectRange = "1d";
    let latestState = null;
    const CLI_VISIBILITY_KEY = `usage:${location.pathname}:cli-visible`;
    let cliVisible = false;
    try {
      cliVisible = window.localStorage.getItem(CLI_VISIBILITY_KEY) === "1";
    } catch (_error) {}

    function languageTable(language) {
      return I18N[language] || I18N[FALLBACK_LANGUAGE] || {};
    }

    function t(key, params = {}) {
      const template = languageTable(currentLanguage)[key] || languageTable(FALLBACK_LANGUAGE)[key] || key;
      return template.replace(/\{(\w+)\}/g, (_, name) => `${params[name] ?? ""}`);
    }

    function labels() {
      return {
        session: t("session_label"),
        weekly: t("weekly_label"),
      };
    }

    function projectRangeLabel(range) {
      if (range === "7d") return t("project_range_7d");
      if (range === "30d") return t("project_range_30d");
      return t("project_range_1d");
    }

    function applyStaticText() {
      document.documentElement.lang = currentLanguage === "zh-TW" ? "zh-Hant" : currentLanguage;
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const key = node.dataset.i18n;
        if (key) node.textContent = t(key);
      });
      const rangeButton = document.querySelector('[data-action="toggle-project-range"]');
      if (rangeButton) rangeButton.textContent = projectRangeLabel(projectRange);
      setCliVisible(cliVisible);
    }

    window.usageSetLanguage = function usageSetLanguage(language) {
      currentLanguage = I18N[language] ? language : FALLBACK_LANGUAGE;
      applyStaticText();
      if (latestState) {
        window.usageApplyState({ ...latestState, language: currentLanguage });
      }
    };

    function cssVar(name) {
      return getComputedStyle(root).getPropertyValue(name).trim();
    }

    function colorFor(percent, fallback) {
      if (typeof percent !== "number") return fallback;
      if (percent >= 80) return cssVar("--danger");
      if (percent >= 50) return cssVar("--warn");
      return fallback;
    }

    function renderRow(card, key, row) {
      const el = document.querySelector(`[data-card="${card}"] [data-row="${key}"]`);
      if (!el) return;
      const cardEl = el.closest(".card");
      if (!cardEl) return;
      const data = row || {
        percent: null,
        percentText: "--",
        resetText: t("reset_placeholder"),
        warning: false,
        available: false,
      };
      const available = data.available === true && typeof data.percent === "number";
      const accent = getComputedStyle(cardEl).getPropertyValue("--accent").trim();
      const color = colorFor(data.percent, accent);
      el.dataset.available = available ? "true" : "false";
      el.innerHTML = `
        <div class="row-head">
          <div class="row-title"></div>
          <div class="percent"></div>
        </div>
        <div class="track"><div class="fill"></div></div>
        <div class="reset"></div>
      `;
      const title = el.querySelector(".row-title");
      const percent = el.querySelector(".percent");
      const reset = el.querySelector(".reset");
      const fill = el.querySelector(".fill");
      if (!title || !percent || !reset || !fill) return;
      title.textContent = labels()[key];
      percent.textContent = data.percentText || "--";
      reset.textContent = data.resetText || t("reset_placeholder");
      reset.dataset.warning = data.warning === true ? "true" : "false";
      percent.style.color = available ? color : "";
      fill.style.width = available ? `${Math.max(0, Math.min(100, data.percent))}%` : "0%";
      fill.style.background = color;
    }

    function applyCard(name, rows) {
      renderRow(name, "session", rows && rows.session);
      renderRow(name, "weekly", rows && rows.weekly);
    }

    function renderProjects(projects) {
      const list = document.querySelector('[data-project-list]');
      if (!list) return;
      const ranks = ["①", "②", "③"];
      list.innerHTML = (projects || []).slice(0, 3).map((p, i) => `
        <div class="proj-row">
          <span class="proj-rank">${ranks[i]}</span>
          <span class="proj-name">${p.name}</span>
          <span class="proj-tokens">${p.tokensText}</span>
          <span class="proj-cost">${p.costText}</span>
        </div>
      `).join("") || `<div style="color:var(--muted);font-size:13px;padding:8px 0">${t("projects_empty")}</div>`;
    }



    function setCliVisible(nextVisible) {
      cliVisible = nextVisible === true;
      try {
        window.localStorage.setItem(CLI_VISIBILITY_KEY, cliVisible ? "1" : "0");
      } catch (_error) {}
      const panel = document.querySelector("[data-cli-panel]");
      const button = document.querySelector('[data-action="toggle-cli"]');
      if (panel) panel.hidden = !cliVisible;
      if (button) button.dataset.active = cliVisible ? "true" : "false";
      if (latestState) renderCliStatus(latestState.cli || {});
    }

    function cliMeter(percent) {
      const safe = typeof percent === "number" ? Math.max(0, Math.min(100, percent)) : 0;
      return `<span class="cli-meter" aria-hidden="true"><span style="width:${safe}%"></span></span>`;
    }

    function renderCliStatus(cli) {
      const panel = document.querySelector("[data-cli-panel]");
      if (!panel || panel.hidden) return;
      const data = cli || {};
      const five = data.fiveHour || {};
      const seven = data.sevenDay || {};
      const context = data.context || {};
      const tokens = data.tokens || {};
      const cache = data.cache || {};
      const cost = data.cost || {};
      const session = data.session || {};
      panel.innerHTML = `
        <div class="cli-line"><span class="cli-program">${data.program || "lollapalooza"}</span><span class="cli-five">${t("cli_five_hour")}: ${cliMeter(five.percent)} ${five.percentText || "--"} <span class="cli-session">${five.resetText || "--"}</span></span><span class="cli-seven">${t("cli_seven_day")}: ${cliMeter(seven.percent)} ${seven.percentText || "--"} <span class="cli-session">${seven.resetText || "--"}</span></span></div>
        <div class="cli-line"><span class="cli-context">${t("cli_context")}: ${context.maxText || "--"} / ${context.usedText || "--"} / ${t("cli_remaining")} ${context.remainingText || "--"} ${cliMeter(context.percent)}</span></div>
        <div class="cli-line"><span class="cli-total">${t("cli_total")} ${t("cli_in_short")}${tokens.inputText || "--"} ${t("cli_out_short")}${tokens.outputText || "--"} <span class="cli-session">(${t("cli_this_turn")} ${t("cli_in_short")}${tokens.turnInputText || "--"} ${t("cli_out_short")}${tokens.turnOutputText || "--"})</span></span></div>
        <div class="cli-line"><span class="cli-cache">${t("cli_cached")} ${cache.readText || "--"} / ${cache.creationText || "--"}</span><span class="cli-cost">${t("cli_cost")} ${cost.usdText || "--"} ≈ ${cost.twdText || "--"}</span></div>
        <div class="cli-line"><span class="cli-session">${t("cli_session")} ${session.durationText || "--"}</span><span class="cli-model">${data.model || "--"}</span></div>
      `;
    }

    window.usageApplyState = function usageApplyState(state) {
      currentLanguage = I18N[state.language] ? state.language : currentLanguage;
      applyStaticText();
      applyCard("claude", state.claude);
      applyCard("codex", state.codex);
      latestState = state;
      renderProjects(
        projectRange === "1d" ? state.projects
        : projectRange === "7d" ? state.projects7d
        : state.projects30d
      );
      renderCliStatus(state.cli || {});
      const rate = document.querySelector('[data-footer="rate"]');
      const status = document.querySelector('[data-footer="status"]');
      const today = document.querySelector('[data-footer="today"]');
      if (rate) rate.textContent = state.footer.rate || t("rate_text", { value: "--" });
      if (status) status.textContent = state.footer.status || t("status_text", { value: "--" });
      if (today) today.textContent = state.footer.today || t("today_text", { cost: "0.00", tokens: "0" });
    };

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      if (button.dataset.action === "toggle-project-range") {
        projectRange = projectRange === "1d" ? "7d" : projectRange === "7d" ? "30d" : "1d";
        button.textContent = projectRangeLabel(projectRange);
        if (latestState) {
          renderProjects(
            projectRange === "1d" ? latestState.projects
            : projectRange === "7d" ? latestState.projects7d
            : latestState.projects30d
          );
        }
        return;
      }
      if (button.dataset.action === "toggle-cli") {
        setCliVisible(!cliVisible);
        return;
      }
      const bridge = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.usage;
      if (bridge && typeof bridge.postMessage === "function") {
        bridge.postMessage(button.dataset.action);
      }
    });

    window.usageApplyState({
      language: "en",
      claude: { session: {}, weekly: {} },
      codex: { session: {}, weekly: {} },
      projects: [],
      projects7d: [],
      projects30d: [],
      cli: {},
      footer: { rate: "Rate: --", status: "Status: Loading", today: "Today: $0.00 (0 tokens)", showInstall: false }
    });
  </script>
</body>
